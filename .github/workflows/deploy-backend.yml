name: Deploy App

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "scripts/deploy-backend.sh"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app on Tencent CVM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: 22
          script: |
            set -eu
            APP_DIR="/opt/chatty"
            BRANCH="main"
            ENV_KEEP="/tmp/chatty-image-storage.env"

            cd "$APP_DIR"
            if [ -f "$APP_DIR/backend/.env" ]; then
              grep -E '^(IMAGE_BACKEND|MINIO_.*)=' "$APP_DIR/backend/.env" > "$ENV_KEEP" || true
            else
              : > "$ENV_KEEP"
            fi
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            mkdir -p "$APP_DIR/backend"
            cat > "$APP_DIR/backend/.env" <<'EOF'
            ${{ secrets.BACKEND_ENV }}
            EOF
            if [ -s "$ENV_KEEP" ]; then
              awk -F= 'NR==FNR { keep[$1]=$0; next } !($1 in keep) { print } END { for (key in keep) print keep[key] }' \
                "$ENV_KEEP" "$APP_DIR/backend/.env" > "$APP_DIR/backend/.env.merged"
              mv "$APP_DIR/backend/.env.merged" "$APP_DIR/backend/.env"
            fi
            chmod 600 "$APP_DIR/backend/.env"

            sh scripts/deploy-backend.sh
